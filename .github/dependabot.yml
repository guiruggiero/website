version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: saturday
      time: "00:00"
      timezone: America/Los_Angeles
    groups:
      all:
        update-types:
          - patch
          - minor
          - major

  - package-ecosystem: npm
    directories:
      - /
      - /functions
    schedule:
      interval: weekly
      day: saturday
      time: "00:00"
      timezone: America/Los_Angeles
    groups:
      all:
        update-types:
          - patch
          - minor
          - major

  - package-ecosystem: pip
    directories:
      - /sonic/agentcore
      - /sonic/scripts
    schedule:
      interval: weekly
      day: saturday
      time: "00:00"
      timezone: America/Los_Angeles
    groups:
      all:
        update-types:
          - patch
          - minor
          - major