<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Nova Sonic test</title>
        
        <link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/@smithy/signature-v4/+esm">
        <link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/@aws-crypto/sha256-browser/+esm">
        <link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/@aws-sdk/client-cognito-identity/+esm">
        <link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/@aws-sdk/client-sts/+esm">
        <link rel="stylesheet" href="sonic.css">
    </head>

    <body>
        <h1>Nova Sonic + Strands Bidi Agent + Bedrock AgentCore</h1>

        <div id="localBar"></div>

        <div id="status">Idle</div>

        <button id="toggleBtn">Start Session</button>

        <div id="textInputRow">
            <input type="text" id="textInput" placeholder="Type a message…" autocomplete="off" disabled>
            <button id="sendBtn" disabled>Send</button>
        </div>

        <div id="transcript"></div>

        <script type="module" src="sonic.js"></script>
    </body>
</html>
